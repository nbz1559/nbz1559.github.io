<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SaturnV — Account</title>
    <link rel="stylesheet" href="../utilitys/style.css">
    <link rel="icon" type="image/x-icon" href="../utilitys/website.ico">
</head>
<body>
<div class="container">
    <aside class="sidebar">
        <h2>SaturnV</h2>
        <nav>
            <ul>
                <li><a href="../main/">Main</a></li>
                <li><a href="../tos/">Terms of Service</a></li>
                <li><a href="#" id="siderbardownload">Download</a></li>
                <li><a href="#" id="sidebardiscord">Discord (Support)</a></li>
                <li><a href="../account/">Account</a></li>
                <li><a href="../other/">Other</a></li>
            </ul>
        </nav>
    </aside>

    <main class="account-content">
        <h2>Account</h2>

        <!-- Logged-out view -->
        <div id="view-auth">
            <div class="account-tabs">
                <div class="account-tab active" data-tab="signup">Create Account</div>
                <div class="account-tab" data-tab="login">Log In</div>
            </div>

            <!-- Sign Up -->
            <div class="account-panel active" id="panel-signup">
                <div class="account-alert" id="signup-alert"></div>

                <div class="account-field">
                    <label>Username</label>
                    <input type="text" id="signup-username" placeholder="e.g. username123" autocomplete="off" maxlength="32"/>
                </div>
                <div class="account-field">
                    <label>Email</label>
                    <input type="email" id="signup-email" placeholder="you@example.com" autocomplete="off"/>
                </div>
                <div class="account-field">
                    <label>Password</label>
                    <input type="password" id="signup-password" placeholder="At least 6 characters"/>
                    <div class="account-hint">Minimum 6 characters.</div>
                </div>

                <button class="account-btn" id="signup-btn" onclick="doSignup()">Create Account</button>
            </div>

            <!-- Log In -->
            <div class="account-panel" id="panel-login">
                <div class="account-alert" id="login-alert"></div>

                <div class="account-field">
                    <label>Email</label>
                    <input type="email" id="login-email" placeholder="you@example.com" autocomplete="off"/>
                </div>
                <div class="account-field">
                    <label>Password</label>
                    <input type="password" id="login-password" placeholder="Your password"/>
                </div>

                <button class="account-btn" id="login-btn" onclick="doLogin()">Log In</button>
            </div>
        </div>

        <!-- Logged-in view -->
        <div id="view-account" style="display:none;">
            <div class="account-info-card">
                <div class="account-info-row">
                    <div class="info-label">Username</div>
                    <div class="info-value" id="account-username">—</div>
                </div>
                <div class="account-info-row">
                    <div class="info-label">Email</div>
                    <div class="info-value" id="account-email">—</div>
                </div>
                <div class="account-info-row">
                    <div class="info-label">Member since</div>
                    <div class="info-value" id="account-created">—</div>
                </div>
            </div>

            <button class="account-btn-outline" onclick="doLogout()">Log Out</button>
        </div>
    </main>
</div>

<script src="../utilitys/sidebar.js"></script>
<script src="../utilitys/account.js"></script>
<footer class="footer-bar">
    &copy; 2026 SaturnV Menu. All rights reserved.
</footer>
</body>
</html>
